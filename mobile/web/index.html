<!DOCTYPE html>
<html lang="es">

<head>
  <base href="$FLUTTER_BASE_HREF">

  <!-- Charset & viewport -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">

  <!-- SEO & descripción -->
  <title>FemControl — Tu ciclo, tu bienestar</title>
  <meta name="description"
    content="Seguimiento del ciclo menstrual orientado a la privacidad. Funciona sin conexión, tus datos se quedan en tu dispositivo.">
  <meta name="keywords" content="ciclo menstrual, seguimiento ciclo, salud femenina, período, fertilidad, privacidad">
  <meta name="author" content="FemControl">

  <!-- PWA theme -->
  <meta name="theme-color" content="#D4735E">
  <meta name="color-scheme" content="light">

  <!-- PWA / Instalación -->
  <link rel="manifest" href="manifest.json">

  <!-- iOS / Safari PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FemControl">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/Icon-512.png">

  <!-- Android Chrome -->
  <meta name="mobile-web-app-capable" content="yes">

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="192x192" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/Icon-512.png">
  <link rel="shortcut icon" href="favicon.png">

  <!-- Open Graph (compartir en redes) -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="FemControl — Tu ciclo, tu bienestar">
  <meta property="og:description"
    content="Seguimiento del ciclo menstrual orientado a la privacidad. Sin servidores, sin sorpresas.">
  <meta property="og:image" content="icons/Icon-512.png">

  <!-- Google Identity Services (para login con Google) -->
  <meta name="google-signin-client_id"
    content="461405054411-qkeock8ojquvkf4aoqkoo279pietusvl.apps.googleusercontent.com">
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    /* ── Reset ───────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background-color: #D4735E;
      overflow: hidden;
    }

    /* ── Pantalla de carga ───────────────────────────── */
    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #D4735E;
      z-index: 9999;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }

    #splash.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .splash-icon {
      width: 96px;
      height: 96px;
      background: rgba(255, 255, 255, 0.18);
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      animation: splashPop 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      opacity: 0;
      transform: scale(0.7);
    }

    .splash-icon svg {
      width: 52px;
      height: 52px;
      fill: white;
    }

    .splash-title {
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 34px;
      font-weight: 800;
      letter-spacing: -1px;
      margin: 0 0 6px 0;
      animation: splashFade 0.5s ease 0.3s forwards;
      opacity: 0;
    }

    .splash-subtitle {
      color: rgba(255, 255, 255, 0.85);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 16px;
      font-weight: 400;
      margin: 0 0 40px 0;
      animation: splashFade 0.5s ease 0.5s forwards;
      opacity: 0;
    }

    /* Puntos animados */
    .splash-dots {
      display: flex;
      gap: 8px;
      animation: splashFade 0.5s ease 0.7s forwards;
      opacity: 0;
    }

    .splash-dots span {
      width: 8px;
      height: 8px;
      background: rgba(255, 255, 255, 0.6);
      border-radius: 50%;
      animation: dotBounce 1.2s ease-in-out infinite;
    }

    .splash-dots span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .splash-dots span:nth-child(3) {
      animation-delay: 0.4s;
    }

    /* ── Animaciones ─────────────────────────────────── */
    @keyframes splashPop {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes splashFade {
      to {
        opacity: 1;
      }
    }

    @keyframes dotBounce {

      0%,
      80%,
      100% {
        transform: translateY(0);
        opacity: 0.6;
      }

      40% {
        transform: translateY(-10px);
        opacity: 1;
      }
    }

    /* Flutter canvas ocupa todo */
    flt-glass-pane {
      width: 100% !important;
      height: 100% !important;
    }
  </style>
</head>

<body>

  <!-- Pantalla de carga que se muestra mientras Flutter inicializa -->
  <div id="splash" role="status" aria-label="Cargando FemControl">
    <div class="splash-icon">
      <!-- Corazón SVG — coincide con el ícono de la app -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path
          d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
      </svg>
    </div>
    <h1 class="splash-title">FemControl</h1>
    <p class="splash-subtitle">Tu ciclo, tu bienestar</p>
    <div class="splash-dots">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>

  <!-- Flutter app -->
  <script>
    // Ocultar splash cuando Flutter renderice el primer frame
    window.addEventListener('flutter-first-frame', function () {
      var splash = document.getElementById('splash');
      if (splash) {
        splash.classList.add('hidden');
        // Limpiar del DOM después de la transición
        setTimeout(function () {
          splash.remove();
        }, 700);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>

</body>

</html>
