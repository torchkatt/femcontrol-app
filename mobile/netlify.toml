[build]
  base    = "mobile"
  command = "flutter build web --pwa-strategy=offline-first --release --base-href=/"
  publish = "build/web"

[build.environment]
  FLUTTER_VERSION = "stable"

[[headers]]
  for = "/flutter_service_worker.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.wasm"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type  = "application/manifest+json"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
